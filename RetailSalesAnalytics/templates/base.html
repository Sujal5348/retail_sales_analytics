<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Retail Sales Analytics System{% endblock %}</title>
    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- FontAwesome Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Custom CSS -->
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <!-- Plotly.js -->
    <script src="https://cdn.plot.ly/plotly-2.27.0.min.js"></script>
</head>
<body>

    <!-- Glassmorphism Navbar -->
    <nav class="navbar navbar-expand-lg navbar-dark navbar-custom sticky-top">
        <div class="container-fluid px-4">
            <a class="navbar-brand d-flex align-items-center gap-2" href="/">
                <i class="fa-solid fa-chart-line text-info fs-4"></i>
                <span>Apex Analytics</span>
            </a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav me-auto mb-2 mb-lg-0 gap-1">
                    <li class="nav-item">
                        <a class="nav-link {% if request.path == '/' %}active fw-bold text-info{% endif %}" href="/"><i class="fa-solid fa-gauge me-1"></i> Executive Dashboard</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link {% if '/sales' in request.path %}active fw-bold text-info{% endif %}" href="/sales"><i class="fa-solid fa-cart-shopping me-1"></i> Sales & Orders</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link {% if '/customers' in request.path %}active fw-bold text-info{% endif %}" href="/customers"><i class="fa-solid fa-users me-1"></i> Customers & CLV</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link {% if '/inventory' in request.path %}active fw-bold text-info{% endif %}" href="/inventory"><i class="fa-solid fa-boxes-stacked me-1"></i> Inventory</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link {% if '/stores' in request.path %}active fw-bold text-info{% endif %}" href="/stores"><i class="fa-solid fa-store me-1"></i> Stores & Regions</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link {% if '/employees' in request.path %}active fw-bold text-info{% endif %}" href="/employees"><i class="fa-solid fa-user-tie me-1"></i> Employees</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link {% if '/analytics' in request.path %}active fw-bold text-info{% endif %}" href="/analytics"><i class="fa-solid fa-terminal me-1"></i> SQL Studio</a>
                    </li>
                </ul>
                <div class="d-flex align-items-center gap-2">
                    <a href="/analytics/export/excel" class="btn btn-sm btn-outline-success">
                        <i class="fa-solid fa-file-excel me-1"></i> Export Excel Report
                    </a>
                </div>
            </div>
        </div>
    </nav>

    <!-- Main Container -->
    <div class="container-fluid p-4">
        {% block content %}{% endblock %}
    </div>

    <!-- Bootstrap 5 JS Bundle -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="{{ url_for('static', filename='js/main.js') }}"></script>
    {% block scripts %}{% endblock %}
</body>
</html>
